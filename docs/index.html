<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Hot Topics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>Finance Hot Topics</h1>
        <p class="subtitle">Daily trending signals from news &amp; discussion</p>
      </div>
      <div class="meta" id="meta">Loading...</div>
    </div>
  </header>

  <div class="ticker-wrapper" id="ticker-wrapper">
    <span class="ticker-label">TRENDING CRYPTO</span>
    <div class="ticker-overflow">
      <div class="ticker-track" id="ticker-track"></div>
    </div>
  </div>

  <main>
    <section id="topics-section">
      <h2>Today's Hot Topics</h2>
      <div id="topics-grid" class="topics-grid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </section>

    <section id="trend-section">
      <h2>30-Day Topic Trends</h2>
      <div class="chart-container">
        <canvas id="trend-chart"></canvas>
      </div>
    </section>
  </main>

  <footer>
    <p>Updated daily via GitHub Actions &middot; Sources: Reuters, CoinDesk, CoinTelegraph, MarketWatch, Yahoo Finance, Investing.com, Reddit</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
