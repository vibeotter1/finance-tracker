<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What's happening</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-title">
        <div class="h1-row">
          <h1>What's happening</h1>
          <span class="date-tag" id="date-tag">—</span>
        </div>
        <p class="subtitle">Daily trends &amp; signals from the world of crypto &amp; finance</p>
      </div>
    </div>
  </header>

  <div class="ticker-wrapper" id="ticker-wrapper">
    <div class="ticker-row" id="crypto-row">
      <span class="ticker-label">CRYPTO</span>
      <div class="ticker-overflow">
        <div class="ticker-track" id="crypto-track"></div>
      </div>
    </div>
    <div class="ticker-row" id="stocks-row">
      <span class="ticker-label">STOCKS</span>
      <div class="ticker-overflow">
        <div class="ticker-track" id="stocks-track"></div>
      </div>
    </div>
  </div>

  <main>
    <section id="topics-section">
      <h2 id="topics-heading">Today's Hot Topics</h2>
      <div id="topics-grid" class="topics-grid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </section>

    <section id="trend-section">
      <div class="section-header">
        <h2>Topic Trends</h2>
        <div class="chart-tabs">
          <button class="chart-tab active" data-days="7">7D</button>
          <button class="chart-tab" data-days="30">30D</button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="trend-chart"></canvas>
      </div>
    </section>

    <section id="archive-section">
      <h2>History</h2>
      <div id="archive-nav" class="archive-nav"></div>
    </section>
  </main>

  <footer>
    <p>Updated daily via GitHub Actions &middot; Sources: Reuters, CoinDesk, CoinTelegraph, MarketWatch, Yahoo Finance, Investing.com, Reddit</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
